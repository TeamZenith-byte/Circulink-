<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — CIRCULINK 2.0</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body style="background:linear-gradient(135deg,#F0FDF4 0%,#DCFCE7 50%,#FEF9EC 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px">

  <!-- LOGO -->
  <a href="/" style="text-decoration:none;margin-bottom:32px;display:flex;align-items:center;gap:10px">
    <div class="nav-logo" style="width:48px;height:48px;border-radius:12px;background:var(--primary);color:white;font-size:18px">C</div>
    <span class="nav-brand-name" style="color:var(--text-primary);font-size:26px">CIRCU<span style="color:var(--primary)">LINK</span></span>
  </a>

  <!-- CARD -->
  <div style="background:white;border:1px solid var(--border);border-radius:var(--radius-xl);padding:36px 32px;width:100%;max-width:420px;box-shadow:var(--shadow-lg)">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:48px;margin-bottom:10px">⚙️</div>
      <h1 style="font-family:'Outfit',sans-serif;font-weight:900;font-size:24px;margin-bottom:6px">Admin Panel</h1>
      <p style="font-size:14px;color:var(--text-secondary)">Secure login for CIRCULINK administrators only.</p>
    </div>

    {% if error %}
    <div class="alert alert-error">❌ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/admin">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter admin username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input type="password" name="password" class="form-control" id="pwdInput" placeholder="Enter password" required>
          <button type="button" onclick="togglePwd()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-secondary)" id="eyeBtn">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:8px">
        🔐 Login to Admin Panel
      </button>
    </form>

    <div style="text-align:center;margin-top:20px">
      <a href="/" style="font-size:13px;color:var(--text-secondary);font-weight:600">← Back to CIRCULINK Home</a>
    </div>
  </div>

  <p style="font-size:12px;color:var(--text-secondary);margin-top:20px;text-align:center">
    CIRCULINK 2.0 · Team Zenith · SISIS176<br>Sharda University Hackathon 2025
  </p>

<script>
function togglePwd() {
  const inp = document.getElementById('pwdInput');
  const btn = document.getElementById('eyeBtn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}
</script>
</body>
</html>
